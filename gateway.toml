# ゲートウェイ設定（リポジトリ直下の ./gateway.toml）。
# サーバーはカレントディレクトリの ./gateway.toml を読む。リポジトリ直下で:
#
#   uv run gw
#
# 1 つの公開エンドポイント（下記 port）で複数モデルを束ね、リクエストの `model` を見て
# そのモデルのローカルサーバーへ振り分ける。各モデルは初回リクエスト時に遅延起動し、
# max_resident はハード上限で、空き枠が無ければ古いものから停止（LRU）。全て処理中なら空くまで
# 待つ（OOM 回避。load_timeout で打ち切り→503）。管理者はこのゲートウェイ 1 プロセスだけを起動/停止する。
#
# モデルの事前登録は不要。`dynamic = true`（既定）なので、クライアントが指定した `model` を
# その場でロード・管理する（バックエンドは ID から推論）。通常利用に加えて、画像入力（mmproj は
# 隣のファイルを自動検出）も、mlx-vlm の MTP（対応モデルは本体名から自動選択して ~2倍速）も、
# 事前登録なしで効く。下の [[models]] は任意で、parallel・llama.cpp の MTP・llama-server への
# 個別フラグ（extra_args）など、ID だけでは決まらない上書きが要るモデルだけ書く。
#
# 各クライアントは（クライアントはサーバーを起動せず接続するだけ）:
#   base_url = "http://127.0.0.1:8799/v1"        # ← 全クライアント共通（ゲートウェイ）
#   model    = "unsloth/Qwen3.6-27B-GGUF:UD-Q4_K_XL"  # ← 任意の（DL 済み）モデルを指定

host = "127.0.0.1"          # bind ホスト（省略時 127.0.0.1＝ローカルのみ）。別PCから繋ぐなら "0.0.0.0"（全IF公開）
port = 8799                 # 公開ポート（省略時 8799）。クライアントの base_url はここ
# api_key = "change-me"     # ネットワーク公開時の認証キー。設定するとクライアントは Authorization: Bearer <key> を要求される
                            # （省略/空で認証なし）。/admin/status・/admin/config はキーに関係なくローカル（127.0.0.1）限定。
                            # 別PCから繋ぐ手順は docs/gateway.md「別PCから接続する（ネットワーク公開）」を参照。
max_resident = 2            # 同時常駐モデル数のハード上限。空きが無ければ LRU 退避、全て処理中なら待つ（省略時 無制限）
                            # 2: Ikazuchi-Mal の会話(gemma-4-26B-A4B 4bit ≈15GB)と OS作業/X bot(Qwen3.6-27B 4bit ≈15GB)を
                            # 併用するため。1 だと切替のたびにモデル再ロード＋プロンプトキャッシュ全損が起きる（要 ~30GB+ RAM）
load_timeout = 300          # 全枠処理中のとき空くのを待つ最大秒数（超過で 503。省略時 300）
# start_timeout = 120       # モデルサーバー1つの起動完了（ready）を待つ最大秒数（省略時 120）。巨大モデルや
                            # コールドディスクで 120 秒を超えるなら延ばす
# request_timeout = 600     # 上流モデルサーバーとの通信が「無応答」のとき打ち切る秒数（省略/0 で無制限）。
                            # トークンが流れている限り切れないのでストリーミングの長時間生成は妨げない。
                            # ハングしたサーバーが処理中扱いのまま枠を塞ぎ続ける事故の保険
idle_timeout = 1200         # この秒数（=20分）使われないモデルは自動アンロードしてメモリ解放（既定 1200。0 で無効）
session_ttl = 90            # 在席エージェントのハートビート猶予秒数。途絶でそのエージェントを無人扱い（既定 90。0 で無効）
internal_base_port = 9001   # 内部モデルサーバーの割当開始ポート（9001, 9002, ... と連番）

# ── 在席ベースの即時アンロード（任意。明示すると idle_timeout を待たずに解放できる）──
# エージェントは利用開始/終了をゲートウェイへ通知できる。あるモデルに在席するエージェントが
# 0 になった瞬間（＝そのモデルを使う人が誰も居なくなった）、処理中でなければ即アンロードする。
#   開始: POST /admin/sessions/register   {"agent_id": "...", "model": "..."}
#   心拍: POST /admin/sessions/heartbeat  {"agent_id": "..."}            # session_ttl 内に定期送信
#   終了: POST /admin/sessions/release    {"agent_id": "..."}            # = DELETE /admin/sessions
# 終了通知を送れずに落ちたエージェントは、心拍が session_ttl 途絶した時点で掃除される。

# 未登録モデルの動的ロード（既定 true）。指定された model をその場で起動・管理し、一覧/ダッシュボードに
# 現れる（アンロードで消える）。バックエンドは ID から推論（gguf→llama-cpp、mlx→mlx-vlm、他→OS 既定）。
# false にすると下の [[models]] に登録したものだけ提供する（旧挙動）。
dynamic = true
# disable_thinking = true   # 動的ロード時の既定（思考抑制）。事前登録は各 [[models]] が優先
# default_model = "..."     # `model` 省略リクエスト時のモデル（任意）
# draft_model = "off"       # 動的ロード時の MTP 既定。既定（未指定）は mlx-vlm を "auto"（対応表から
#                           # 自動選択）。"off" で動的 MTP を一律無効化、HF id で全モデルに明示指定
# parallel = 4              # 動的ロードする llama-cpp モデルの並列スロット既定（mlx 系は無視。→ docs/llama-cpp.md）

# ───────────────────────────────────────────────────────────────────────────────
# 事前登録（任意）。parallel・llama.cpp の MTP・llama-server への個別フラグ等、ID だけでは
# 決まらない上書きが要るモデルだけ書く。dynamic = true なら下は全て省略可（mlx-vlm の MTP と
# 画像入力は動的ロードでも自動で効くので、それ目的の事前登録は不要）。必要なら例のコメントを外す。
#
# mlx-vlm で MTP を個別に無効化／別ドラフターを明示したいときだけ（自動で効くので通常は不要）:
# [[models]]
# model = "ToPo-ToPo/Qwen3.6-27B-mlx-4bit"
# backend = "mlx-vlm"
# draft_model = "off"       # このモデルだけ MTP を無効化（HF id を書けば別ドラフターを明示）
#
# llama.cpp GGUF（vision・parallel）。model は HF repo-id（org/repo[:量子化]）。mmproj は自動検出:
# [[models]]
# model = "unsloth/Qwen3.6-27B-GGUF:UD-Q4_K_XL"
# backend = "llama-cpp"
# parallel = 4
# disable_thinking = true
#
# llama.cpp GGUF（埋め込み MTP・テキスト専用・~1.5-2倍速）。vision/parallel>1 は併用不可:
# [[models]]
# model = "unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL"
# backend = "llama-cpp"
# disable_thinking = true
# draft_model = "self"      # 本体内蔵 MTP を使う（--spec-type draft-mtp）
#
# llama.cpp GGUF（別ヘッド MTP）。draft に MTP ヘッド repo-id を指定（vision と併用可）:
# [[models]]
# model = "unsloth/gemma-4-26B-A4B-it-qat-GGUF"
# backend = "llama-cpp"
# parallel = 4
# disable_thinking = true
# draft_model = "unsloth/gemma-4-26B-A4B-it-qat-GGUF:F16-MTP"
#
# 音声認識（STT）。mlx-whisper を OpenAI 互換の /v1/audio/transcriptions として束ねる。
# ID に whisper/parakeet を含めば動的ロードで自動判定されるので、通常この事前登録も不要。
# 音声デコードに ffmpeg CLI が要る（→ docs/gateway.md「音声認識（STT / whisper）」）:
# [[models]]
# model = "mlx-community/whisper-large-v3-turbo"
# backend = "whisper"
