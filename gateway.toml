# ゲートウェイ設定（リポジトリ直下の ./gateway.toml）。
# サーバーはカレントディレクトリの ./gateway.toml を読む。リポジトリ直下で:
#
#   uv run gw
#
# 1 つの公開エンドポイント（下記 port）で複数モデルを束ね、リクエストの `model` を見て
# そのモデルのローカルサーバーへ振り分ける。各モデルは初回リクエスト時に遅延起動し、
# max_resident はハード上限で、空き枠が無ければ古いものから停止（LRU）。全て処理中なら空くまで
# 待つ（OOM 回避。load_timeout で打ち切り→503）。管理者はこのゲートウェイ 1 プロセスだけを起動/停止する。
#
# モデルの事前登録は不要。`dynamic = true`（既定）なので、クライアントが指定した `model` を
# その場でロード・管理する（バックエンドは ID から推論）。通常利用に加えて、画像入力（mmproj は
# 隣のファイルを自動検出）も、mlx-vlm の MTP（対応モデルは本体名から自動選択して ~2倍速）も、
# 事前登録なしで効く。下の [[models]] は任意で、parallel・llama.cpp の MTP・llama-server への
# 個別フラグ（extra_args）など、ID だけでは決まらない上書きが要るモデルだけ書く。
#
# 各クライアントは（クライアントはサーバーを起動せず接続するだけ）:
#   base_url = "http://127.0.0.1:8799/v1"        # ← 全クライアント共通（ゲートウェイ）
#   model    = "unsloth/Qwen3.6-27B-GGUF:UD-Q4_K_XL"  # ← 任意の（DL 済み）モデルを指定

host = "127.0.0.1"          # bind ホスト（省略時 127.0.0.1＝ローカルのみ）。別PCから繋ぐなら "0.0.0.0"（全IF公開）
port = 8799                 # 公開ポート（省略時 8799）。クライアントの base_url はここ
# api_key = "change-me"     # ネットワーク公開時の認証キー。設定するとクライアントは Authorization: Bearer <key> を要求される
                            # （省略/空で認証なし）。/admin/status・/admin/config はキーに関係なくローカル（127.0.0.1）限定。
                            # 別PCから繋ぐ手順は docs/gateway.md「別PCから接続する（ネットワーク公開）」を参照。
max_resident = 2            # 同時常駐モデル数のハード上限。空きが無ければ LRU 退避、全て処理中なら待つ（省略時 無制限）
                            # 2: Ikazuchi-Mal の会話(gemma-4-26B-A4B 4bit ≈15GB)と OS作業/X bot(Qwen3.6-27B 4bit ≈15GB)を
                            # 併用するため。1 だと切替のたびにモデル再ロード＋プロンプトキャッシュ全損が起きる（要 ~30GB+ RAM）
load_timeout = 300          # 全枠処理中のとき空くのを待つ最大秒数（超過で 503。省略時 300）
# start_timeout = 120       # モデルサーバー1つの起動完了（ready）を待つ最大秒数（省略時 120）。巨大モデルや
                            # コールドディスクで 120 秒を超えるなら延ばす
# request_timeout = 600     # 上流モデルサーバーとの通信が「無応答」のとき打ち切る秒数（省略時 600=10分。0 で無制限）。
                            # トークンが流れている限り切れないのでストリーミングの長時間生成は妨げない。
                            # ハングした／沈黙したサーバーが処理中扱いのまま枠を塞ぎ続ける事故の保険
idle_timeout = 1200         # この秒数（=20分）使われないモデルは自動アンロードしてメモリ解放（既定 1200。0 で無効）
session_ttl = 90            # 在席エージェントのハートビート猶予秒数。途絶でそのエージェントを無人扱い（既定 90。0 で無効）
internal_base_port = 9001   # 内部モデルサーバーの割当開始ポート（9001, 9002, ... と連番）

# ── 繰り返しループ抑制（mlx / mlx-vlm 系のみ。既定で有効）──
# 低温・量子化のローカル LLM は「同じ内容を延々と繰り返して終わらない」degeneration に
# 陥りやすい。これを緩和するため、mlx 系バックエンド宛の chat リクエストへ
# repetition_penalty を**既定で注入**する（mlx-lm/mlx-vlm 拡張。llama-cpp は名前が
# repeat_penalty で別物なので対象外）。クライアントが自分で repetition_penalty を
# 指定していれば尊重して上書きしない。
# repetition_penalty = 1.1          # 既定 1.1（穏当）。1.1〜1.3 が実用域。大きいほど強く抑制するが
                                    # 文法・必要な繰り返しも巻き添えになり不自然になりやすい
# repetition_penalty = 0            # 0 / false / "off" で**無効化**（注入しない＝「設定しない」選択）
# repetition_context_size = 64      # 参照する直近トークン窓（省略時は上流の既定 20 に任せる。研究推奨 64）
# repetition_penalty_skip_structured = true  # tools（native ツールコール）や response_format（構造化出力）を
#                                   # 含むリクエストには注入しない（既定 false＝全 chat に注入）。JSON 構文の
#                                   # 必須の繰り返しを減点しうるのを避ける保険（実測では 1.1 で実害なし）

# ── 在席ベースの即時アンロード（任意。明示すると idle_timeout を待たずに解放できる）──
# エージェントは利用開始/終了をゲートウェイへ通知できる。あるモデルに在席するエージェントが
# 0 になった瞬間（＝そのモデルを使う人が誰も居なくなった）、処理中でなければ即アンロードする。
#   開始: POST /admin/sessions/register   {"agent_id": "...", "model": "..."}
#   心拍: POST /admin/sessions/heartbeat  {"agent_id": "..."}            # session_ttl 内に定期送信
#   終了: POST /admin/sessions/release    {"agent_id": "..."}            # = DELETE /admin/sessions
# 終了通知を送れずに落ちたエージェントは、心拍が session_ttl 途絶した時点で掃除される。

# ── 自動更新（TUI 運用時。既定 true）──
# GitHub から clone して `uv run gw` で使う運用向け。TUI が起動時と実行中（30分毎）に PyPI の
# 最新版を確認し、新しければ `git pull --ff-only`（＋uv sync）でソースを追従し、新コードで再起動する。
# 安全策として **作業ツリーがクリーンで upstream 追跡ブランチのときだけ** 適用する（開発中で未コミット
# 変更がある PC では適用せず、TUI に「利用可（保留）」を出すだけ。u キーで手動適用）。実行中は
# ゲートウェイがアイドル（処理中0・在席0）になった瞬間に適用するので、進行中の生成を中断しない。
# git クローンでない（PyPI から `uv tool install` 等）場合は何もしない。false で完全無効。
auto_update = true

# 未登録モデルの動的ロード（既定 true）。指定された model をその場で起動・管理し、一覧/ダッシュボードに
# 現れる（アンロードで消える）。バックエンドは ID から推論（gguf→llama-cpp、mlx→mlx-vlm、他→OS 既定）。
# false にすると下の [[models]] に登録したものだけ提供する（旧挙動）。
dynamic = true
# disable_thinking = true   # 動的ロード時の既定（思考抑制）。事前登録は各 [[models]] が優先
# default_model = "..."     # `model` 省略リクエスト時のモデル（任意）
# vision_model = "ToPo-ToPo/gemma-4-31b-it-mlx-4bit"  # 画像入りリクエストの振り分け先（任意）。設定すると
#                           # 画像を含むリクエストだけを（元 model に関わらず）このモデルへ流す。テキストは
#                           # 元モデルのまま。現行 mlx_vlm で画像が壊れているモデル（Qwen3.6-27B 等）を避け、
#                           # 画像だけを確実に動く gemma-4 系へ逃がす用途（→ docs/mtp.md「画像入力(vision)」）。
# draft_model = "off"       # 動的ロード時の MTP 既定。既定（未指定）は mlx-vlm を "auto"（対応表から
#                           # 自動選択）。"off" で動的 MTP を一律無効化、HF id で全モデルに明示指定
# parallel = 4              # 動的ロードする llama-cpp モデルの並列スロット既定（mlx 系は無視。→ docs/llama-cpp.md）

# ── llama.cpp（llama-server）バイナリの自動導入（任意。全省略で全自動）──
# Linux / Windows / macOS のどれでも、llama-cpp モデルを使う構成なら起動時に llama-server を
# 自動でダウンロード・導入する（PATH は汚さず管理ディレクトリへ）。GPU があれば Vulkan、
# 無ければ CPU、macOS は Metal を自動選択する。詳細は docs/llama-cpp.md。
# [llama_cpp]
# provision = "auto"        # auto=自動DL（既定）/ system=PATH の llama-server を使う / build=ソースビルド
# accel = "auto"            # auto=検出 / cuda（Windows 限定・要 cudart）/ vulkan / metal / cpu を明示
# pin = "b9946"             # ビルド番号を固定（省略で最新を取得し、以後は導入済みを使い続ける）

# ── vLLM（任意。高スループット生成。Linux/NVIDIA・Windows は WSL2）──
# backend = "vllm" のモデルを [[models]] に登録すると使える（明示 opt-in）。torch+CUDA を含む
# 重量級パッケージ（要 GPU・Linux/NVIDIA）。多人数同時・高スループット向け。詳細は docs/vllm.md。
# 導入は extras が既定: `uv sync --extra vllm`（clone 運用）で入れてから使う（勝手に自動DLしない）。
# [vllm]
# provision = "system"      # system=現在の環境の vllm を使う（既定・extras で入れる）/ auto=隔離 venv へ自動 pip install

# ── SGLang（任意。vLLM の対抗。Linux/NVIDIA・Windows は WSL2）──
# backend = "sglang" のモデルで使える。RadixAttention（プレフィックスキャッシュ）で、同じ
# システムプロンプト/ツール定義を毎回送る「エージェント運用」に強い。要 GPU・Linux/NVIDIA。
# 導入は extras が既定: `uv sync --extra sglang`（clone 運用）。bench で vLLM と比較して選ぶ。
# [sglang]
# provision = "system"      # system=現在の環境の sglang を使う（既定・extras で入れる）/ auto=隔離 venv へ自動 pip install

# ── 動画入力（任意）──
# リクエストの content に video_url（data URI / http URL / ローカルパス）を入れると、ゲートウェイが
# ffmpeg で等間隔にフレーム抽出し image_url 列に展開して上流へ渡す（llama-cpp / mlx-vlm 共通）。
# ffmpeg は pip 同梱（imageio-ffmpeg）で供給されるので追加インストール不要。ホットリロード対象。
# video_frames = 8          # 1 本の動画から抜くフレーム数（多いほど精細だがトークン増）
# video_max_edge = 768      # 各フレームの長辺ピクセル（縮小してトークン量を抑える）

# ───────────────────────────────────────────────────────────────────────────────
# 事前登録（任意）。parallel・llama.cpp の MTP・llama-server への個別フラグ等、ID だけでは
# 決まらない上書きが要るモデルだけ書く。dynamic = true なら下は全て省略可（mlx-vlm の MTP と
# 画像入力は動的ロードでも自動で効くので、それ目的の事前登録は不要）。必要なら例のコメントを外す。
#
# mlx-vlm で MTP を個別に無効化／別ドラフターを明示したいときだけ（自動で効くので通常は不要）:
# [[models]]
# model = "ToPo-ToPo/Qwen3.6-27B-mlx-4bit"
# backend = "mlx-vlm"
# draft_model = "off"       # このモデルだけ MTP を無効化（HF id を書けば別ドラフターを明示）
#
# ── Ternary Bonsai 27B（Prism ML の三値モデル。Qwen3.6-27B ベースの vision-language）──
# 三値 2bit の MLX パックは **素の mlx-vlm（本リポジトリが既にピンしている 0.6.3）で動く**
# （フォーク不要。フォークが要るのは 1bit 版のみで、それは iPhone 向け）。事前登録するのは
# ID から決まらない上書き（MTP 無効化）を効かせるためで、動的ロードでも backend は mlx-vlm に
# 推論される。事前に `hf download prism-ml/Ternary-Bonsai-27B-mlx-2bit`（約8.5GB・公開リポ）で取得しておくこと。
#   推奨サンプリング（クライアント側で指定）: temperature = 0.7 / top_p = 0.95 / top_k = 20
#   思考（thinking）は既定OFF運用。mlx-vlm サーバは enable_thinking 未指定なら思考OFF（実測確認済み）。
#   注意: Bonsai の公表ベンチ（三値 80.49 / FP16比 94.6%）は全て thinking mode の値。数学・コード・
#   エージェント等の推論タスクで質を出したいリクエストだけ enable_thinking=true を送る運用にする。
[[models]]
model = "prism-ml/Ternary-Bonsai-27B-mlx-2bit"
backend = "mlx-vlm"       # 27B は vision-language。mlx-vlm なら画像入力も使える（三値パックは FP16 vision tower 同梱）
draft_model = "off"       # DSpark drafter は Apple Silicon の batch-1 では償却できず既定無効（→ off を明示）
# disable_thinking は mlx-vlm では build_command が参照しない（無効）。既定OFF はサーバ側の挙動で担保される

# ── Bonsai 27B 1-bit（GGUF / llama.cpp 経路。軽量テキスト運用）──
# 1bit は MLX（素の mlx）では動かない（1bit カーネル無し）が、**GGUF なら mainline llama.cpp の
# Metal でそのまま動く**（Q1_0 は upstream にマージ済み。フォーク不要。実測 ~59 tok/s）。
# model は `org/repo:セレクタ`。`:Q1_0` で多量子化リポから本体1ファイル（Bonsai-27B-Q1_0.gguf, 3.8GB）を特定。
# 取得: `hf download prism-ml/Bonsai-27B-gguf Bonsai-27B-Q1_0.gguf`
# 画像入力を使うなら別途 mmproj を同じスナップショットへ置くと自動で --mmproj が付く:
#   `hf download prism-ml/Bonsai-27B-gguf Bonsai-27B-mmproj-Q8_0.gguf`
# 品質は三値 > 1bit。Mac の主力は上の三値 mlx-vlm、これは軽量な代替として。
[[models]]
model = "prism-ml/Bonsai-27B-gguf:Q1_0"
backend = "llama-cpp"
draft_model = "off"       # DSpark drafter は使わない（Apple Silicon batch-1 で非効率。上の三値と同方針）
disable_thinking = true   # 既定は思考OFF（Bonsai テンプレートの既定は ON なので明示的に切る）。
                          # 思考を効かせたいリクエストだけ enable_thinking=true を送る運用

# vLLM（Linux/NVIDIA。Windows は WSL2 内で）。HF repo-id（safetensors）を指定。高スループット:
# [[models]]
# model = "Qwen/Qwen3-8B"
# backend = "vllm"
# extra_args = ["--max-model-len", "8192"]   # vLLM への個別フラグはそのまま渡る（任意）
#
# SGLang（vLLM の対抗。プレフィックス共有が多いエージェント用途に強い）。model は HF repo-id:
# [[models]]
# model = "Qwen/Qwen3-8B"
# backend = "sglang"
# extra_args = ["--context-length", "8192"]  # SGLang への個別フラグはそのまま渡る（任意）
#
# llama.cpp GGUF（vision・parallel）。model は HF repo-id（org/repo[:量子化]）。mmproj は自動検出:
# [[models]]
# model = "unsloth/Qwen3.6-27B-GGUF:UD-Q4_K_XL"
# backend = "llama-cpp"
# parallel = 4
# disable_thinking = true
#
# llama.cpp GGUF（埋め込み MTP・テキスト専用・~1.5-2倍速）。vision/parallel>1 は併用不可:
# [[models]]
# model = "unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL"
# backend = "llama-cpp"
# disable_thinking = true
# draft_model = "self"      # 本体内蔵 MTP を使う（--spec-type draft-mtp）
#
# llama.cpp GGUF（別ヘッド MTP）。draft に MTP ヘッド repo-id を指定（vision と併用可）:
# [[models]]
# model = "unsloth/gemma-4-26B-A4B-it-qat-GGUF"
# backend = "llama-cpp"
# parallel = 4
# disable_thinking = true
# draft_model = "unsloth/gemma-4-26B-A4B-it-qat-GGUF:F16-MTP"
#
# 音声認識（STT）。mlx-whisper を OpenAI 互換の /v1/audio/transcriptions として束ねる。
# ID に whisper/parakeet を含めば動的ロードで自動判定されるので、通常この事前登録も不要。
# 音声デコードに ffmpeg CLI が要る（→ docs/gateway.md「音声認識（STT / whisper）」）:
# [[models]]
# model = "mlx-community/whisper-large-v3-turbo"
# backend = "whisper"
