# ゲートウェイのモデルカタログ（リポジトリ直下の ./gateway.toml）。
# サーバーはカレントディレクトリの ./gateway.toml を読む。リポジトリ直下で:
#
#   uv run local-llm-server
#
# 1 つの公開エンドポイント（下記 port）で複数モデルを束ね、リクエストの `model` を見て
# そのモデルのローカルサーバーへ振り分ける。各モデルは初回リクエスト時に遅延起動し、
# max_resident はハード上限で、空き枠が無ければ古いものから停止（LRU）。全て処理中なら空くまで
# 待つ（OOM 回避。load_timeout で打ち切り→503）。外部アプリ（Ollama /
# LM Studio 等）に依存しない。管理者はこのゲートウェイ 1 プロセスだけを起動/停止する。
#
# 各クライアントは（クライアントはサーバーを起動せず接続するだけ）:
#   base_url = "http://127.0.0.1:8799/v1"        # ← 全クライアント共通（ゲートウェイ）
#   model    = "mlx-community/Qwen3.6-27B-4bit"  # ← クライアントごとに選ぶ

host = "127.0.0.1"          # 公開ホスト（省略時 127.0.0.1）
port = 8799                 # 公開ポート（省略時 8799）。クライアントの base_url はここ
max_resident = 1            # 同時常駐モデル数のハード上限。空きが無ければ LRU 退避、全て処理中なら待つ（省略時 無制限）
load_timeout = 300          # 全枠処理中のとき空くのを待つ最大秒数（超過で 503。省略時 300）
idle_timeout = 1200         # この秒数（=20分）使われないモデルは自動アンロードしてメモリ解放（既定 1200。0 で無効）
internal_base_port = 9001   # 内部モデルサーバーの割当開始ポート（9001, 9002, ... と連番）
# default_model = "mlx-community/Qwen3.6-27B-4bit"  # `model` 省略リクエスト時のモデル（任意）

# 未登録モデルの動的ロード（既定 true）。下の [[models]] に無いモデルもリクエスト時に起動・管理し、
# 一覧/ダッシュボードに現れる（アンロードで消える）。バックエンドは ID から推論（gguf→llama-cpp、
# mlx→mlx-vlm、他→OS 既定）。個別オプション（MTP/parallel 等）が要るモデルだけ下に事前登録する。
# false にすると事前登録のみ（旧挙動）。dynamic = true なら [[models]] は省略してもよい。
dynamic = true
# disable_thinking = true   # 動的ロード時の既定（思考抑制）。事前登録は各 [[models]] が優先

# MTP（speculative decoding）の既定。各 [[models]] が draft_model を持たなければこれを継承し、
# 本体名から対応ドラフターを自動選択する（mlx-vlm のみ有効。出力は変えず高速化）。
# 個別に上書き（HF id 指定）や "off" で無効化もできる。
draft_model = "auto"

[[models]]
model = "mlx-community/Qwen3.6-27B-4bit"        # マルチモーダル（テキスト＋画像）
backend = "mlx-vlm"
# draft_model 省略 → 上の既定 "auto" を継承（Qwen3.6 の MTP で ~2倍速）

[[models]]
model = "mlx-community/gemma-4-26B-A4B-it-qat-4bit"  # 別クライアント用の例（こちらも MTP 対応）
backend = "mlx-vlm"
# draft_model 省略 → "auto" を継承。MTP を切るなら draft_model = "off"

# llama.cpp（GGUF）の例。model は HF repo-id（org/repo）で指定する（実パス非対応。DL 済みキャッシュから
# 実 GGUF を解決。未取得だと起動時エラー。クライアントに見せる ID も repo-id で見やすい。複数 quant が
# ある repo は `org/repo:量子化名` で 1 つに絞る）。backend = "llama-cpp"。disable_thinking = true で直答に。
# マルチモーダル（画像入力）は本体の隣に mmproj(.gguf) があれば自動検出して有効化（手動設定不要。テキスト
# のみ入力では速度・精度に影響なし）。無効化は extra_args = ["--no-mmproj"]。
# Qwen3.6 GGUF（unsloth）。Qwen3.6 は MTP が本体に内蔵されているが、llama.cpp では MTP と
# vision(--mmproj)/parallel>1 が併用不可。そこで用途別に 2 エントリに分ける（repo が違えば ID 衝突なし）。
# (1) vision 版（MTP なし・画像入力可・parallel 可）:
[[models]]
model = "unsloth/Qwen3.6-27B-GGUF:UD-Q4_K_XL"
backend = "llama-cpp"
parallel = 4            # 同時処理スロット（llama.cpp のみ）
disable_thinking = true # 思考を抑制して直答に（任意）

# (2) MTP 版（埋め込み MTP・テキスト専用・~1.5-2倍速）。draft_model="self" で本体内蔵の MTP ヘッドを
# 使う（別ドラフト不要）。この方式は vision/parallel>1 不可なので自動的に付けない。
[[models]]
model = "unsloth/Qwen3.6-27B-MTP-GGUF:UD-Q4_K_XL"
backend = "llama-cpp"
disable_thinking = true
draft_model = "self"    # 本体内蔵 MTP を使う（--spec-type draft-mtp）

# Gemma 4 GGUF（公式 QAT q4_0・vision 対応・MTP なし）。同梱 mmproj を自動検出。
[[models]]
model = "google/gemma-4-26B-A4B-it-qat-q4_0-gguf"
backend = "llama-cpp"
parallel = 4
disable_thinking = true

# Gemma 4 GGUF（MTP 版・vision 対応）。draft_model に MTP ヘッドを指定すると speculative decoding
# （draft-mtp）で高速化する（出力はロスレス。実測 ~1.2倍）。ファイル名に "mtp" を含むと
# --spec-type draft-mtp が自動付与。base は unsloth repo を使い、公式版と repo が異なるので ID 衝突しない。
[[models]]
model = "unsloth/gemma-4-26B-A4B-it-qat-GGUF"
backend = "llama-cpp"
parallel = 4
disable_thinking = true
draft_model = "unsloth/gemma-4-26B-A4B-it-qat-GGUF:F16-MTP"

# 画像を使わない用途は、テキスト専用 LLM（backend = "mlx"）にすると軽い・速い。
# vision 専用の VLM ではないので画像リクエストはエラーになる。MTP は mlx-vlm 専用なので
# mlx では無視される（"off" を明示しておくと起動時の警告も出ない）。使うなら下のコメントを外す:
# [[models]]
# model = "mlx-community/Qwen3.5-27B-4bit"   # テキスト専用 LLM（VLM ではない）
# backend = "mlx"
# draft_model = "off"
