[project]
name = "local-llm-server"
version = "0.11.0"
description = "ローカルLLM（mlx / mlx-vlm / llama.cpp）を OpenAI 互換 API で束ねるマルチモデルゲートウェイ。gateway.toml のカタログを 1 ポートで配信し、model で振り分け・遅延起動・LRU 退避・MTP 高速化（Ollama 流の共有デーモン）"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "ToPo-ToPo-ToPo" }]
keywords = ["llm", "local-llm", "mlx", "mlx-vlm", "llama.cpp", "openai", "server", "inference"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
    "Operating System :: OS Independent",
]
# 高レベルクライアント（LLMClient / connect）は公式 openai SDK を土台にするため、
# openai をコア依存とする（自動リトライ・型付き応答・ツール呼び出し/構造化出力が使える）。
# 推論バックエンド本体は extras で導入する（環境マーカーで Apple Silicon のときだけ
# 自動選択。他OSは llama.cpp を各自インストール）。
dependencies = [
    "openai>=1.0",
]

[project.optional-dependencies]
# Apple Silicon 向け mlx 系バックエンド（テキスト/vision/STT）。
mlx = [
    "mlx-lm>=0.31.3 ; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "mlx-vlm>=0.5.0 ; sys_platform == 'darwin' and platform_machine == 'arm64'",
]
# システムトレイ常駐の状態モニタ GUI（Windows / macOS / Linux）。`local-llm-server-gui` で起動。
# トレイ描画は pystray、アイコン画像生成に pillow。各 OS のバックエンド依存も合わせて入れる
# （macOS: pyobjc、Linux: python-xlib による Xorg バックエンド。Windows は追加不要）。
gui = [
    "pystray>=0.19",
    "pillow>=9",
    "pyobjc-framework-Cocoa>=9 ; sys_platform == 'darwin'",
    "pyobjc-framework-Quartz>=9 ; sys_platform == 'darwin'",
    "python-xlib>=0.33 ; sys_platform == 'linux'",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[project.urls]
Repository = "https://github.com/ToPo-ToPo-ToPo/local-llm-server"

[project.scripts]
local-llm-server = "local_llm_server.cli:main"
local-llm-server-gui = "local_llm_server.gui:main"

[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["local_llm_server*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
